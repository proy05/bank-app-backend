spring.application.name=bank-app-backend

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=root

# Reduce logging level. Set logging level to warn and above
logging.level.root=warn

# Show JPA/Hibernate logging messages
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.orm.jdbc.bind=trace

# --- Actuator Configuration ---
# Expose specific endpoints (health and info are usually safe)
# Use "*" to expose everything (ONLY for development!)
management.endpoints.web.exposure.include=health,info,metrics,mappings

# Show full health details (handy for debugging DB connections)
management.endpoint.health.show-details=always

# --- Swagger / OpenAPI Configuration ---
# Custom path for Swagger UI (Default is /swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html
# Custom path for the OpenAPI spec JSON
springdoc.api-docs.path=/api-docs